<div class="registro-container">
  <h2>Registro</h2>
  <form (submit)="onSubmit($event)">
    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" [(ngModel)]="nombre" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" required>
    </div>
    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" [(ngModel)]="username" required>
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" [(ngModel)]="password" required>
    </div>
    <button type="submit">Registrarse</button>
    <div *ngIf="error" style="color: red; margin-top: 1rem; text-align: center;">{{ error }}</div>
    <div *ngIf="success" style="color: green; margin-top: 1rem; text-align: center;">{{ success }}</div>
  </form>
</div>
