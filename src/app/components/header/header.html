<header>
    <nav>
        <a routerLink="/">Inicio</a>
        <a routerLink="/productos">Productos</a>
        <a routerLink="/nosotros">Nosotros</a>
        <a routerLink="/contacto">Contacto</a>
        <div class="carrito-container">
            <button class="carrito-btn" (click)="mostrarCarrito = !mostrarCarrito">
                🛒 <span class="carrito-cantidad">{{ totalItems }}</span>
            </button>
            <button class="pagar-btn-mini" (click)="pagar()">Pagar</button>
            <div class="carrito-dropdown" *ngIf="mostrarCarrito">
                <div *ngIf="cartService.getCart().length === 0">El carrito está vacío</div>
                <div *ngFor="let item of cartService.getCart()">
                    <span>{{item.producto.nombre}}</span>
                    <button (click)="cartService.removeFromCart(item.producto)">-</button>
                    <span>{{item.cantidad}}</span>
                    <button (click)="cartService.addToCart(item.producto)">+</button>
                </div>
                <div *ngIf="cartService.getCart().length > 0">
                    <strong>Total: ${{ cartService.getTotalPrice() }}</strong>
                    <button class="vaciar-carrito-btn" (click)="vaciarCarrito()" title="Vaciar carrito">🗑️</button>
                </div>
            </div>
        </div>
    </nav>
</header>
